<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; script-src 'self' 'unsafe-inline';"/>
  <title>HO–Branch Reconciliation</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%;background:#07080f;color:#dde1ee;font-family:'IBM Plex Sans',sans-serif;overflow:hidden;font-size:13px}
    #root{height:100vh;display:flex;flex-direction:column}
    ::-webkit-scrollbar{width:5px;height:5px}
    ::-webkit-scrollbar-track{background:#0d0e17}
    ::-webkit-scrollbar-thumb{background:#252635;border-radius:3px}
    input,select,textarea{font-family:'IBM Plex Mono',monospace;background:#0d0e17;border:1px solid #252635;color:#c8cce0;border-radius:5px;padding:5px 8px;font-size:11px;outline:none}
    input:focus,select:focus{border-color:#4a6fa5}
  </style>
</head>
<body>
  <div id="root"></div>
  <script src="renderer.js"></script>
</body>
</html>
